        const res = document.getElementById("results");

        function toggleCard(el) {
            el.parentElement.classList.toggle("active");
        }

        function doSearch() {
            const q = document.getElementById("search").value.toLocaleLowerCase("tr-TR").trim();
            res.innerHTML = "";
            
            const isSearching = q !== "";

            const filtered = !isSearching ? data : data.filter(function(l) {
                return l.title.toLocaleLowerCase("tr-TR").indexOf(q) !== -1;
            });

            if(filtered.length === 0) {
                res.innerHTML = "<div class='no-result'>🔍 Sonuç bulunamadı.</div>";
                return;
            }

            for(let i = 0; i < filtered.length; i++) {
                const l = filtered[i];
                let itemsHtml = "";
                for(let j = 0; j < l.items.length; j++) {
                    itemsHtml += "<div class='item'>• " + l.items[j] + "</div>";
                }
                let noteHtml = l.note ? "<div class='note'><b>Not:</b> " + l.note + "</div>" : "";
                
                const card = document.createElement("div");
                // Arama yapılıyorsa kart otomatik açık (active) gelsin
                card.className = "card" + (isSearching ? " active" : "");
                
                card.innerHTML = 
                    "<div class='card-header' onclick='toggleCard(this)'>" +
                        "<h3>" + l.title + "</h3>" +
                        "<span class='arrow'>▼</span>" +
                    "</div>" +
                    "<div class='card-content'>" + 
                        itemsHtml + noteHtml + 
                    "</div>";
                
                res.appendChild(card);
            }
        }

        window.onload = doSearch;
    </script>
